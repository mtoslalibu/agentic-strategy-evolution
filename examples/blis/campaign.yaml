research_question: >
  Can SLO-gated admission control reduce TTFT P99 latency under high load
  without degrading overall throughput?

target_system:
  name: "BLIS — LLM Inference Serving Simulator"
  description: >
    BLIS is a discrete-event simulator for LLM inference serving systems.
    It models request arrivals, scheduling policies, KV-cache management,
    and GPU resource allocation to study performance under realistic workloads.
  observable_metrics:
    - TTFT_P50_ms
    - TTFT_P99_ms
    - TPOT_ms
    - throughput_req_per_sec
    - gpu_utilization_pct
    - kv_cache_hit_rate
  controllable_knobs:
    - scheduler_policy
    - max_batch_size
    - preemption_mode
    - cache_eviction_policy
    - admission_control_threshold

review:
  design_perspectives:
    - statistical-rigor
    - causal-sufficiency
    - confound-risk
    - generalization
    - mechanism-clarity
  findings_perspectives:
    - statistical-rigor
    - causal-sufficiency
    - confound-risk
    - generalization
    - mechanism-clarity
    - reproducibility
    - measurement-validity
    - error-classification
    - principle-consistency
    - domain-plausibility
  max_review_rounds: 3

prompts:
  methodology_layer: "prompts/methodology"
  domain_adapter_layer: null
